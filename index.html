<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>NEG</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div id="top-bar">
      <div id="top-left">
        <span id="status-dot" class="dot-nobase"></span>
        <span id="status">STARTING</span>
        <button id="btn-calib">CALIB</button>
      </div>
      <div id="top-right">
        <button id="btn-sample">SET BASE</button>
        <button id="btn-capture" class="primary">CAPTURE</button>
      </div>
    </div>
    <div id="bottom-bar">
      <div class="preset-row">
        <label>FILM</label>
        <select id="sl-preset">
          <option value="ektar100">Ektar 100</option>
          <option value="portra400">Portra 400</option>
          <option value="portra800">Portra 800</option>
          <option value="gold200">Gold 200</option>
          <option value="fuji200">Fuji 200</option>
          <option value="cinestill800t">CineStill 800T</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="slider-row" id="zoom-row" style="display:none;">
        <label>ZM</label>
        <input type="range" id="sl-zoom" min="1" max="5" step="0.1" value="1" />
        <span id="val-zoom">1.0</span>
      </div>
      <div class="slider-row">
        <label>R</label>
        <input type="range" id="sl-r" min="0.3" max="2.0" step="0.01" value="1.0" />
        <span id="val-r">1.00</span>
      </div>
      <div class="slider-row">
        <label>G</label>
        <input type="range" id="sl-g" min="0.3" max="2.0" step="0.01" value="0.85" />
        <span id="val-g">0.85</span>
      </div>
      <div class="slider-row">
        <label>B</label>
        <input type="range" id="sl-b" min="0.3" max="2.0" step="0.01" value="0.70" />
        <span id="val-b">0.70</span>
      </div>
      <div class="slider-row">
        <label>EV</label>
        <input type="range" id="sl-ev" min="0.1" max="4.0" step="0.05" value="1.0" />
        <span id="val-ev">1.00</span>
      </div>
      <div class="slider-row">
        <label>FF</label>
        <input type="range" id="sl-ff" min="0.0" max="1.0" step="0.01" value="0.0" />
        <span id="val-ff">0.00</span>
      </div>
      <button id="btn-reset">RESET</button>
    </div>
  </div>

  <div id="intro-overlay">POINT AT FILM LEADER &rarr; TAP SET BASE</div>
  <div id="shutter-flash"></div>
  <div id="crosshair"></div>

  <script src="./gl/program.js"></script>
  <script src="./camera.js"></script>
  <script src="./app.js"></script>
</body>
</html>
